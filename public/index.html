<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help Desk — Badge Generator</title>
  <link rel="stylesheet" href="/css/badge.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/lib/cropper.min.css">
</head>
<body>

<header class="app-header">
  <h1>Badge Generator</h1>
  <div class="tagline">please hold.</div>
</header>

<main class="editor">
  <!-- Live badge preview -->
  <div class="preview-wrapper">
    <div class="badge-preview-scaled" id="badgePreviewArea"></div>
  </div>

  <!-- Control panel -->
  <div class="controls">
    <div class="control-row">
      <label class="control-label" for="nameInput">Name</label>
      <div class="custom-input-row">
        <input type="text" class="control-input" id="nameInput" placeholder="First name" maxlength="16" autocomplete="off" autofocus>
        <span class="char-count" id="nameCharCount">0/16</span>
      </div>
    </div>
    <div class="control-row">
      <label class="control-label">Photo</label>
      <div class="photo-controls">
        <button class="btn-sm" id="uploadBtn">Upload</button>
        <button class="btn-sm" id="cameraBtn">Selfie</button>
        <span class="photo-status" id="photoStatus">No photo</span>
      </div>
      <input type="file" id="fileInput" accept="image/*" capture="user" style="display:none">
    </div>
    <div class="control-row">
      <label class="control-label" for="deptSelect">Department</label>
      <select class="control-select" id="deptSelect"></select>
      <div class="custom-input-row">
        <input type="text" class="control-input control-input-sm" id="deptCustom" placeholder="or type your own" maxlength="24" autocomplete="off">
        <span class="char-count" id="deptCharCount">0/24</span>
      </div>
    </div>
    <div class="control-row">
      <label class="control-label" for="titleSelect">Title</label>
      <select class="control-select" id="titleSelect"></select>
      <div class="custom-input-row">
        <input type="text" class="control-input control-input-sm" id="titleCustom" placeholder="or type your own" maxlength="30" autocomplete="off">
        <span class="char-count" id="titleCharCount">0/30</span>
      </div>
    </div>
    <div class="control-row">
      <label class="control-label" for="songSelect">Song</label>
      <select class="control-select" id="songSelect"></select>
    </div>
    <div class="control-row">
      <label class="control-label" for="waveStyleSelect">Waveform</label>
      <select class="control-select" id="waveStyleSelect">
        <option value="barcode">Barcode</option>
        <option value="sticker">Sticker (Mirrored)</option>
      </select>
    </div>
    <button class="btn btn-download" id="downloadBtn">Download Badge</button>
  </div>
</main>

<!-- Full-size badge for capture (hidden off-screen) -->
<div class="badge-capture" id="badgeCapture">
  <div class="badge" id="badge">
    <div class="lanyard-slot"><div class="lanyard-hole"></div></div>
    <div class="navy-stripe">
      <span class="stripe-text stripe-text-left">HELP</span>
      <span class="stripe-text stripe-text-right">DESK</span>
      <div class="stripe-accent"></div>
      <div class="stripe-accent-bottom"></div>
      <div class="stripe-dots"></div>
    </div>
    <div class="texture-overlay"></div>
    <div class="logo-icon">HD</div>
    <div class="content">
      <div class="header">
        <div class="header-divider"></div>
      </div>
      <div class="photo-section">
        <div class="photo-frame">
          <span class="photo-placeholder-text">PHOTO</span>
        </div>
        <div class="employee-id"><span class="status-dot" id="statusDot">●</span><span id="idField">HD-0000</span><span class="issued-date" id="issuedField">ISSUED 00.00.00</span></div>
        <div class="access-badge" id="accessBadge">PENDING REVIEW</div>
      </div>
      <div class="info-section">
        <div class="name" id="nameField">YOUR NAME</div>
        <div class="info-divider"></div>
        <div class="department" id="deptField">SELECT DEPARTMENT</div>
        <div class="title" id="titleField">Select Title</div>
        <div class="waveform-sticker">
          <div class="waveform" id="waveform"></div>
          <div class="waveform-label">
            <span class="waveform-song" id="waveformSong">SELECT SONG</span>
            <span class="waveform-duration" id="waveformDuration">0:00</span>
          </div>
          <div class="waveform-caption" id="waveformCaption">SCAN TO FILE COMPLAINT</div>
        </div>
      </div>
    </div>
    <div class="fine-print">
      PROPERTY OF HELP DESK INC. &bull; NOT VALID FOR PARKING &bull; NO REFUNDS ON MORALE
    </div>
  </div>
</div>

<!-- Crop modal -->
<div class="crop-modal" id="cropModal">
  <div class="crop-container">
    <img id="cropImage" alt="Crop your photo">
  </div>
  <div class="crop-actions">
    <button class="btn btn-secondary" onclick="cancelCrop()">Cancel</button>
    <button class="btn btn-primary" onclick="applyCrop()">Use This Photo</button>
  </div>
</div>

<!-- Loading overlay -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Generating your badge...</div>
</div>

<script src="/lib/cropper.min.js"></script>
<script src="/lib/html2canvas.min.js"></script>
<script src="/js/badge-render.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
