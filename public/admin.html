<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Dashboard — Help Desk Inc.</title>
  <link rel="stylesheet" href="/css/badge.css">
  <link rel="stylesheet" href="/lib/cropper.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #1C1C22;
      color: #E0E8F0;
      min-height: 100vh;
    }

    /* Login Screen */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 24px;
    }
    .login-card {
      background: #2A2A32;
      border: 1px solid #3A3A44;
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .login-card h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #5B8DEF;
      margin-bottom: 8px;
    }
    .login-card h2 {
      font-family: 'Barlow', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: white;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .login-card input {
      width: 100%;
      padding: 12px 16px;
      background: #1C1C22;
      border: 1px solid #3A3A44;
      border-radius: 8px;
      color: #E0E8F0;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .login-card input:focus {
      outline: none;
      border-color: #5B8DEF;
    }
    .login-card button {
      width: 100%;
      padding: 12px;
      background: #2E7DFF;
      border: none;
      border-radius: 8px;
      color: white;
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .login-card button:hover { background: #5BA3FF; }
    .login-error {
      color: #DC2626;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    /* Dashboard */
    .dashboard { display: none; }
    .dash-header {
      background: #2A2A32;
      border-bottom: 2px solid #5B8DEF;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1400px;
      margin: 0 auto;
    }
    .dash-header h1 {
      font-family: 'Barlow', sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: white;
    }
    .dash-header .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #667788;
      letter-spacing: 2px;
      margin-top: 2px;
    }
    .dash-header button {
      background: none;
      border: 1px solid #3A3A44;
      color: #8899AA;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .dash-header button:hover {
      border-color: #5B8DEF;
      color: #5B8DEF;
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      gap: 16px;
      padding: 20px 24px;
      overflow-x: auto;
      max-width: 1400px;
      margin: 0 auto;
    }
    .stat-card {
      background: #2A2A32;
      border: 1px solid #3A3A44;
      border-radius: 10px;
      padding: 16px 20px;
      min-width: 140px;
      flex: 1;
    }
    .stat-card .stat-value {
      font-family: 'Barlow', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: white;
    }
    .stat-card .stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #667788;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* Filters */
    .filters-bar {
      display: flex;
      gap: 12px;
      padding: 0 24px 16px;
      flex-wrap: wrap;
      max-width: 1400px;
      margin: 0 auto;
    }
    .filter-input {
      padding: 8px 14px;
      background: #2A2A32;
      border: 1px solid #3A3A44;
      border-radius: 8px;
      color: #E0E8F0;
      font-size: 13px;
      flex: 1;
      min-width: 180px;
    }
    .filter-input:focus {
      outline: none;
      border-color: #556677;
    }
    .filter-select {
      padding: 8px 14px;
      background: #2A2A32;
      border: 1px solid #3A3A44;
      border-radius: 8px;
      color: #E0E8F0;
      font-size: 13px;
      min-width: 160px;
    }

    /* Table */
    .badge-table-wrap {
      padding: 0 24px 40px;
      overflow-x: auto;
      max-width: 1400px;
      margin: 0 auto;
    }
    .badge-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .badge-table th {
      text-align: left;
      padding: 10px 12px;
      font-family: 'JetBrains Mono', monospace;
      color: #667788;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid #3A3A44;
      white-space: nowrap;
    }
    .badge-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #2A2A32;
      vertical-align: middle;
    }
    .badge-table tr:hover td {
      background: #2A2A32;
    }
    .badge-thumb {
      width: 40px;
      height: 64px;
      object-fit: cover;
      border-radius: 4px;
      background: #3A3A44;
      cursor: pointer;
    }
    .badge-id {
      font-family: 'JetBrains Mono', monospace;
      color: #8899AA;
      font-size: 11px;
    }
    .badge-name { font-weight: 600; color: white; }
    .badge-dept {
      font-size: 12px;
      color: #8899AA;
    }
    .status-visible {
      color: #44BB66;
      font-size: 12px;
    }
    .status-hidden {
      color: #DC2626;
      font-size: 12px;
    }
    .status-band {
      background: #3D2F00;
      color: #FFCC00;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Action buttons */
    .btn-action {
      padding: 4px 10px;
      border: 1px solid #3A3A44;
      background: none;
      color: #8899AA;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      margin-right: 4px;
    }
    .btn-action:hover {
      border-color: #667788;
      color: white;
    }
    .btn-action.btn-danger:hover {
      border-color: #DC2626;
      color: #DC2626;
    }
    .btn-action.btn-paid {
      border-color: #22C55E;
      color: #22C55E;
    }
    .btn-action.btn-printed {
      border-color: #3B82F6;
      color: #3B82F6;
    }
    .status-paid {
      color: #22C55E;
      font-size: 12px;
    }
    .status-unpaid {
      color: #667788;
      font-size: 12px;
    }
    .status-printed {
      color: #3B82F6;
      font-size: 12px;
    }
    .status-flagged {
      color: #F59E0B;
      font-size: 12px;
      font-weight: 600;
    }
    .btn-action.btn-flagged {
      border-color: #F59E0B;
      color: #F59E0B;
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 16px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .pagination button {
      padding: 6px 14px;
      background: #2A2A32;
      border: 1px solid #3A3A44;
      border-radius: 6px;
      color: #E0E8F0;
      cursor: pointer;
      font-size: 13px;
    }
    .pagination button:hover { border-color: #667788; }
    .pagination button:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .pagination .page-info {
      display: flex;
      align-items: center;
      color: #667788;
      font-size: 13px;
    }

    /* Analytics Section */
    .analytics-section {
      padding: 0 24px 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .analytics-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .analytics-header h2 {
      font-family: 'Barlow', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #8899AA;
    }
    .analytics-toggle {
      background: none;
      border: 1px solid #3A3A44;
      color: #8899AA;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
    }
    .analytics-toggle:hover {
      border-color: #5B8DEF;
      color: #5B8DEF;
    }
    .analytics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    .analytics-card {
      background: #2A2A32;
      border: 1px solid #3A3A44;
      border-radius: 10px;
      padding: 16px;
    }
    .analytics-card h3 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #667788;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .analytics-card .rank-list {
      list-style: none;
    }
    .analytics-card .rank-list li {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 13px;
      border-bottom: 1px solid #2A2A32;
    }
    .analytics-card .rank-list li:last-child {
      border-bottom: none;
    }
    .rank-name {
      color: #E0E8F0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 160px;
    }
    .rank-count {
      color: #667788;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      min-width: 30px;
      text-align: right;
    }
    .rank-num {
      color: #5B8DEF;
      font-size: 11px;
      margin-right: 6px;
      min-width: 16px;
    }
    .analytics-pair {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }
    .analytics-pair .pair-label { color: #8899AA; }
    .analytics-pair .pair-value { color: white; font-weight: 600; }
    .analytics-bar {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
      background: #1C1C22;
    }
    .analytics-bar .bar-fill {
      height: 100%;
      transition: width 0.3s;
    }

    /* Date inputs */
    input[type="date"] {
      padding: 8px 14px;
      background: #2A2A32;
      border: 1px solid #3A3A44;
      border-radius: 8px;
      color: #E0E8F0;
      font-size: 13px;
      min-width: 140px;
    }
    input[type="date"]:focus {
      outline: none;
      border-color: #556677;
    }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
    }

    /* Confirm dialog */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .confirm-card {
      background: #2A2A32;
      border: 1px solid #3A3A44;
      border-radius: 12px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .confirm-card h3 {
      color: #DC2626;
      margin-bottom: 12px;
      font-size: 16px;
    }
    .confirm-card p {
      color: #8899AA;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .confirm-card .btn-row {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .confirm-card button {
      padding: 8px 20px;
      border-radius: 6px;
      border: 1px solid #3A3A44;
      background: none;
      color: #E0E8F0;
      cursor: pointer;
      font-size: 13px;
    }
    .confirm-card .btn-confirm {
      background: #DC2626;
      border-color: #DC2626;
      color: white;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #667788;
    }

    /* Crop Modal */
    .admin-crop-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .admin-crop-modal.active {
      display: flex;
    }
    .admin-crop-container {
      width: 100%;
      max-width: 500px;
      max-height: 60vh;
    }
    .admin-crop-container img {
      max-width: 100%;
      display: block;
    }
    .admin-crop-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .admin-crop-actions button {
      padding: 10px 24px;
      border-radius: 8px;
      border: 1px solid #3A3A44;
      background: #2A2A32;
      color: #E0E8F0;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
    }
    .admin-crop-actions button:hover {
      border-color: #667788;
    }
    .admin-crop-actions .btn-crop-confirm {
      background: #2E7DFF;
      border-color: #2E7DFF;
      color: white;
    }
    .admin-crop-actions .btn-crop-confirm:hover {
      background: #5BA3FF;
    }

    @media (max-width: 768px) {
      .stats-bar { flex-direction: column; }
      .stat-card { min-width: auto; }
      .badge-table { font-size: 12px; }
      .badge-table th, .badge-table td { padding: 8px 6px; }
      .badge-thumb { width: 30px; height: 48px; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>Restricted Access</h1>
    <h2>HR Dashboard</h2>
    <input type="password" id="tokenInput" placeholder="Enter admin token" autocomplete="off">
    <button onclick="doLogin()">Authenticate</button>
    <div class="login-error" id="loginError">Access denied. Invalid token.</div>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="dash-header">
    <div>
      <h1>HR Dashboard</h1>
      <div class="subtitle">Authorized Personnel Only</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button onclick="toggleAnalytics()">Analytics</button>
      <button onclick="toggleDemo()">Demo Mode</button>
      <button onclick="toggleLogs()">System Log</button>
      <button onclick="exportCSV()">Export CSV</button>
      <button onclick="doLogout()">Sign Out</button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="filters-bar">
    <input class="filter-input" id="searchInput" type="text" placeholder="Search by name, ID, or department...">
    <select class="filter-select" id="divisionFilter">
      <option value="">All Divisions</option>
    </select>
    <select class="filter-select" id="deptFilter">
      <option value="">All Departments</option>
    </select>
    <select class="filter-select" id="photoFilter">
      <option value="">All Photos</option>
      <option value="1">With Photo</option>
      <option value="0">No Photo</option>
    </select>
    <select class="filter-select" id="statusFilter">
      <option value="">All Statuses</option>
      <option value="unpaid">Unpaid</option>
      <option value="paid">Paid</option>
      <option value="unprinted">Not Printed</option>
      <option value="printed">Printed</option>
      <option value="flagged">Flagged</option>
    </select>
  </div>
  <div class="filters-bar">
    <input type="date" id="dateFrom" title="From date">
    <input type="date" id="dateTo" title="To date">
    <button class="analytics-toggle" onclick="setDatePreset('today')">Today</button>
    <button class="analytics-toggle" onclick="setDatePreset('yesterday')">Yesterday</button>
    <button class="analytics-toggle" onclick="setDatePreset('week')">This Week</button>
    <button class="analytics-toggle" onclick="setDatePreset('month')">This Month</button>
    <button class="analytics-toggle" onclick="setDatePreset('quarter')">This Quarter</button>
    <button class="analytics-toggle" onclick="clearDates()">Clear Dates</button>
  </div>

  <div class="analytics-section" id="analyticsSection" style="display:none;">
    <div class="analytics-header">
      <h2>Badge Analytics</h2>
    </div>
    <div class="analytics-grid" id="analyticsGrid"></div>
  </div>

  <!-- Demo Mode Section -->
  <div class="analytics-section" id="demoSection" style="display:none;">
    <div class="analytics-header">
      <h2>Demo Mode</h2>
    </div>
    <div class="analytics-card" style="max-width:600px;">
      <div style="display:flex;gap:16px;align-items:end;margin-bottom:16px;">
        <div>
          <label style="display:block;font-size:11px;color:#667788;margin-bottom:4px;">Badges</label>
          <input type="number" id="demoCount" value="30" min="5" max="100" class="filter-input" style="width:80px;min-width:auto;">
        </div>
        <div>
          <label style="display:block;font-size:11px;color:#667788;margin-bottom:4px;">Duration (sec)</label>
          <input type="number" id="demoDuration" value="300" min="30" max="900" class="filter-input" style="width:100px;min-width:auto;">
        </div>
        <button class="btn-action" style="padding:8px 16px;font-size:13px;" id="demoStartBtn" onclick="demoStart()">Start Demo</button>
        <button class="btn-action" style="padding:8px 16px;font-size:13px;display:none;" id="demoStopBtn" onclick="demoStop()">Stop</button>
        <button class="btn-action btn-danger" style="padding:8px 16px;font-size:13px;" id="demoCleanupBtn" onclick="demoCleanup()">Cleanup</button>
      </div>
      <div id="demoProgress" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#667788;">
        Status: idle
      </div>
      <div style="margin-top:8px;height:6px;background:#1C1C22;border-radius:3px;overflow:hidden;">
        <div id="demoProgressBar" style="height:100%;width:0%;background:#5B8DEF;transition:width 0.5s;border-radius:3px;"></div>
      </div>
    </div>
  </div>

  <!-- System Log Section -->
  <div class="analytics-section" id="logSection" style="display:none;">
    <div class="analytics-header">
      <h2>System Log</h2>
      <span style="font-size:11px;color:#667788;" id="logRefreshStatus">Auto-refresh: ON</span>
    </div>
    <div id="logOutput" style="background:#1C1C22;border:1px solid #3A3A44;border-radius:8px;padding:12px;max-height:400px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6;"></div>
  </div>

  <div class="badge-table-wrap">
    <table class="badge-table">
      <thead>
        <tr>
          <th>Badge</th>
          <th>ID</th>
          <th>Name</th>
          <th>Department</th>
          <th>Title</th>
          <th>Status</th>
          <th>Paid</th>
          <th>Printed</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="badgeTableBody"></tbody>
    </table>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<!-- Crop Modal -->
<div class="admin-crop-modal" id="adminCropModal">
  <div class="admin-crop-container">
    <img id="adminCropImage" alt="Crop photo">
  </div>
  <div class="admin-crop-actions">
    <button onclick="cancelAdminCrop()">Cancel</button>
    <button class="btn-crop-confirm" onclick="applyAdminCrop()">Use This Photo</button>
  </div>
</div>

<script src="/lib/cropper.min.js"></script>
<script>
// ─── State ──────────────────────────────────────────────
let token = sessionStorage.getItem('admin-token') || '';
let currentPage = 1;
let totalPages = 1;
let searchTimeout = null;
let departments = [];

// ─── Auth ───────────────────────────────────────────────
function doLogin() {
  const input = document.getElementById('tokenInput');
  token = input.value.trim();
  if (!token) return;

  // Test the token
  apiFetch('/api/admin/stats')
    .then(data => {
      if (data.error) throw new Error(data.error);
      sessionStorage.setItem('admin-token', token);
      showDashboard();
    })
    .catch(() => {
      document.getElementById('loginError').style.display = 'block';
      token = '';
    });
}

function doLogout() {
  token = '';
  sessionStorage.removeItem('admin-token');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('tokenInput').value = '';
  document.getElementById('loginError').style.display = 'none';
}

// ─── API Helper ─────────────────────────────────────────
async function apiFetch(url, opts = {}) {
  const headers = { 'Authorization': `Bearer ${token}`, ...opts.headers };
  const res = await fetch(url, { ...opts, headers });
  return res.json();
}

// ─── Dashboard Init ─────────────────────────────────────
function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadStats();
  loadDivisions();
  loadBadges();
  loadAnalytics();
}

// ─── Stats ──────────────────────────────────────────────
async function loadStats() {
  const data = await apiFetch('/api/admin/stats');
  if (data.error) return;

  departments = Object.keys(data.byDepartment || {});
  const deptFilter = document.getElementById('deptFilter');
  deptFilter.innerHTML = '<option value="">All Departments</option>';
  departments.forEach(d => {
    deptFilter.innerHTML += `<option value="${d}">${d} (${data.byDepartment[d]})</option>`;
  });

  const statsBar = document.getElementById('statsBar');
  const hidden = data.hiddenCount || 0;
  statsBar.innerHTML = `
    <div class="stat-card">
      <div class="stat-value">${data.totalBadges || 0}</div>
      <div class="stat-label">Total Badges</div>
    </div>
    <div class="stat-card">

      <div class="stat-label">Flagged</div>
    </div>
    <div class="stat-card">

      <div class="stat-label">Departments</div>

// ─── Badge List ─────────────────────────────────────────
async function loadBadges() {
  const search = document.getElementById('searchInput').value.trim();
  const dept = document.getElementById('deptFilter').value;
  const division = document.getElementById('divisionFilter').value;
  const dateFrom = document.getElementById('dateFrom').value;
  const dateTo = document.getElementById('dateTo').value;
  const hasPhoto = document.getElementById('photoFilter').value;

  let url = `/api/admin/badges?page=${currentPage}&limit=50`;
  if (search) url += `&search=${encodeURIComponent(search)}`;
  if (dept) url += `&department=${encodeURIComponent(dept)}`;
  if (division) url += `&division=${encodeURIComponent(division)}`;
  if (dateFrom) url += `&dateFrom=${encodeURIComponent(dateFrom)}`;
  if (dateTo) url += `&dateTo=${encodeURIComponent(dateTo)}`;
  if (hasPhoto) url += `&hasPhoto=${hasPhoto}`;

  const data = await apiFetch(url);
  if (data.error) return;

  totalPages = data.pages || 1;

  // Client-side status filter
  let badges = data.badges || [];
  const statusFilter = document.getElementById('statusFilter').value;
  if (statusFilter === 'unpaid') badges = badges.filter(b => !b.isPaid);
  else if (statusFilter === 'paid') badges = badges.filter(b => b.isPaid);
  else if (statusFilter === 'unprinted') badges = badges.filter(b => !b.isPrinted);
  else if (statusFilter === 'printed') badges = badges.filter(b => b.isPrinted);
  else if (statusFilter === 'flagged') badges = badges.filter(b => b.isFlagged);

  renderTable(badges);
  renderPagination();
}

function renderTable(badges) {
  const tbody = document.getElementById('badgeTableBody');

  if (badges.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty-state">No badges found.</td></tr>';
    return;
  }

  tbody.innerHTML = badges.map(b => {
    const imgSrc = `/api/badge/${b.employeeId}/thumb?t=${Date.now()}`;
    const statusClass = b.isVisible ? 'status-visible' : 'status-hidden';
    const statusText = b.isVisible ? 'Visible' : 'Hidden';
    const bandTag = b.isBandMember ? ' <span class="status-band">BAND</span>' : '';
    const date = b.createdAt ? new Date(b.createdAt).toLocaleDateString() : '—';
    const hideLabel = b.isVisible ? 'Hide' : 'Show';

    const paidClass = b.isPaid ? 'status-paid' : 'status-unpaid';
    const paidText = b.isPaid ? 'Paid' : '—';
    const paidBtnClass = b.isPaid ? 'btn-action btn-paid' : 'btn-action';
    const paidBtnLabel = b.isPaid ? 'Unpay' : 'Mark Paid';

    const printedClass = b.isPrinted ? 'status-printed' : 'status-unpaid';
    const printedText = b.isPrinted ? 'Printed' : '—';
    const printedBtnClass = b.isPrinted ? 'btn-action btn-printed' : 'btn-action';
    const printedBtnLabel = b.isPrinted ? 'Unprint' : 'Mark Printed';

    const flagTag = b.isFlagged ? ' <span class="status-flagged">FLAG</span>' : '';
    const flagBtnClass = b.isFlagged ? 'btn-action btn-flagged' : 'btn-action';
    const flagBtnLabel = b.isFlagged ? 'Unflag' : 'Flag';

    return `<tr>
      <td><a href="/api/badge/${b.employeeId}/image?t=${Date.now()}" target="_blank"><img class="badge-thumb" src="${imgSrc}" alt="Badge" loading="lazy"></a></td>
      <td><span class="badge-id">${b.employeeId}</span></td>
      <td><span class="badge-name">${esc(b.name)}</span>${flagTag}</td>
      <td><span class="badge-dept">${esc(b.department)}</span></td>
      <td>${esc(b.title)}</td>
      <td><span class="${statusClass}">${statusText}</span>${bandTag}</td>
      <td><span class="${paidClass}">${paidText}</span></td>
      <td><span class="${printedClass}">${printedText}</span></td>
      <td>${date}</td>
      <td>
        <button class="btn-action" onclick="uploadPhoto('${b.employeeId}')" title="Upload photo">&#128247; Photo</button>
        <button class="btn-action" onclick="renderBadge('${b.employeeId}')" title="Render badge PNG">&#127912; Render</button>
        <button class="${flagBtnClass}" onclick="toggleFlag('${b.employeeId}')">${flagBtnLabel}</button>
        <button class="${paidBtnClass}" onclick="togglePaid('${b.employeeId}')">${paidBtnLabel}</button>
        <button class="${printedBtnClass}" onclick="togglePrinted('${b.employeeId}')">${printedBtnLabel}</button>
        <button class="btn-action" onclick="toggleHide('${b.employeeId}')">${hideLabel}</button>
        <button class="btn-action btn-danger" onclick="confirmDelete('${b.employeeId}', '${esc(b.name)}')">Delete</button>
      </td>
    </tr>`;
  }).join('');
}

function renderPagination() {
  const el = document.getElementById('pagination');
  el.innerHTML = `
    <button ${currentPage <= 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">Prev</button>
    <span class="page-info">Page ${currentPage} of ${totalPages}</span>
    <button ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">Next</button>
  `;
}

function goPage(p) {
  currentPage = p;
  loadBadges();
}

let adminCropper = null;
let adminCropTargetId = null;

function uploadPhoto(id) {
  adminCropTargetId = id;
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => openAdminCropModal(e.target.result);
    reader.readAsDataURL(file);
  };
  input.click();
}

function openAdminCropModal(imgSrc) {
  const modal = document.getElementById('adminCropModal');
  const img = document.getElementById('adminCropImage');
  img.src = imgSrc;
  modal.classList.add('active');

  if (adminCropper) adminCropper.destroy();

  img.onload = () => {
    adminCropper = new Cropper(img, {
      aspectRatio: 740 / 720,
      viewMode: 1,
      dragMode: 'move',
      autoCropArea: 0.9,
      cropBoxResizable: true,
      cropBoxMovable: true,
      guides: false,
      highlight: false,
      background: false,
    });
  };
}

function cancelAdminCrop() {
  document.getElementById('adminCropModal').classList.remove('active');
  if (adminCropper) { adminCropper.destroy(); adminCropper = null; }
  adminCropTargetId = null;
}

async function applyAdminCrop() {
  if (!adminCropper || !adminCropTargetId) return;

  const canvas = adminCropper.getCroppedCanvas({
    width: 700,
    height: 630,
    imageSmoothingQuality: 'high',
  });

  canvas.toBlob(async (blob) => {
    const formData = new FormData();
    formData.append('photo', blob, 'photo.jpg');
    try {
      const res = await fetch(`/api/admin/badge/${adminCropTargetId}/photo`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${sessionStorage.getItem('admin-token')}` },
        body: formData,
      });
      const data = await res.json();
      if (data.success) {
        alert(data.message);
        loadBadges();
      } else {
        alert('Upload failed: ' + (data.error || 'Unknown error'));
      }
    } catch (err) {
      alert('Upload failed: ' + err.message);
    }
    cancelAdminCrop();
  }, 'image/jpeg', 0.85);
}

function confirmDelete(id, name) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-card">
      <h3>Permanent Delete</h3>
      <p>Permanently delete badge <strong>${name}</strong> (${id})? This cannot be undone.</p>
      <div class="btn-row">
        <button onclick="this.closest('.confirm-overlay').remove()">Cancel</button>
        <button class="btn-confirm" onclick="doDelete('${id}', this)">Delete</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

async function doDelete(id, btn) {
  btn.textContent = 'Deleting...';
  btn.disabled = true;
  await apiFetch(`/api/admin/badge/${id}`, { method: 'DELETE' });
  const overlay = btn.closest('.confirm-overlay');
  if (overlay) overlay.remove();
  loadStats();
  loadBadges();
}

// ─── Date Presets ───────────────────────────────────────
function setDatePreset(preset) {
  const today = new Date();
  const fmt = d => d.toISOString().slice(0, 10);

  if (preset === 'today') {
    document.getElementById('dateFrom').value = fmt(today);
    document.getElementById('dateTo').value = fmt(today);
  } else if (preset === 'yesterday') {
    const y = new Date(today); y.setDate(y.getDate() - 1);
    document.getElementById('dateFrom').value = fmt(y);
    document.getElementById('dateTo').value = fmt(y);
  } else if (preset === 'week') {
    const w = new Date(today); w.setDate(w.getDate() - 7);
    document.getElementById('dateFrom').value = fmt(w);
    document.getElementById('dateTo').value = fmt(today);
  } else if (preset === 'month') {
    const m = new Date(today.getFullYear(), today.getMonth(), 1);
    document.getElementById('dateFrom').value = fmt(m);
    document.getElementById('dateTo').value = fmt(today);
  } else if (preset === 'quarter') {
    const qMonth = Math.floor(today.getMonth() / 3) * 3;
    const q = new Date(today.getFullYear(), qMonth, 1);
    document.getElementById('dateFrom').value = fmt(q);
    document.getElementById('dateTo').value = fmt(today);
  }
  currentPage = 1;
  loadBadges();
}

function clearDates() {
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  currentPage = 1;
  loadBadges();
}

// ─── Analytics ──────────────────────────────────────────
let analyticsVisible = false;

function toggleAnalytics() {
  analyticsVisible = !analyticsVisible;
  document.getElementById('analyticsSection').style.display = analyticsVisible ? 'block' : 'none';
  if (analyticsVisible) loadAnalytics();
}

async function loadAnalytics() {
  if (!analyticsVisible) return;
  const data = await apiFetch('/api/admin/analytics');
  if (data.error) return;

  const grid = document.getElementById('analyticsGrid');
  const fanTotal = data.fanBadgeCount || 0;

  function rankList(items, max) {
    if (!items || items.length === 0) return '<div style="color:#667788;font-size:12px;">No data yet</div>';
    return '<ul class="rank-list">' + items.slice(0, max).map((item, i) =>
      `<li><span><span class="rank-num">${i+1}.</span><span class="rank-name">${esc(item.name)}</span></span><span class="rank-count">${item.count}</span></li>`
    ).join('') + '</ul>';
  }

  function pctBar(a, b, colorA, colorB) {
    const total = a + b;
    if (total === 0) return '';
    const pctA = Math.round(a / total * 100);
    return `<div class="analytics-bar"><div class="bar-fill" style="width:${pctA}%;background:${colorA}"></div><div class="bar-fill" style="width:${100-pctA}%;background:${colorB}"></div></div>`;
  }

  grid.innerHTML = `
    <div class="analytics-card">
      <h3>Top Songs</h3>
      ${rankList(data.topSongs, 10)}
    </div>
    <div class="analytics-card">
      <h3>Top Titles</h3>
      ${rankList(data.topTitles, 10)}
      <div class="analytics-pair" style="margin-top:8px;border-top:1px solid #3A3A44;padding-top:8px;">
        <span class="pair-label">Custom (unique) titles</span>
        <span class="pair-value">${data.customTitleCount || 0}</span>
      </div>
    </div>
    <div class="analytics-card">
      <h3>Top Departments</h3>
      ${rankList(data.topDepartments, 10)}
    </div>
    <div class="analytics-card">
      <h3>Badge Breakdown</h3>
      <div class="analytics-pair">
        <span class="pair-label">Fan badges</span>
        <span class="pair-value">${fanTotal}</span>
      </div>
      <div class="analytics-pair">
        <span class="pair-label">Paid</span>
        <span class="pair-value" style="color:#22C55E">${data.paidCount || 0}</span>
      </div>
      <div class="analytics-pair">
        <span class="pair-label">Unpaid</span>
        <span class="pair-value">${data.unpaidCount || 0}</span>
      </div>
      ${pctBar(data.paidCount || 0, data.unpaidCount || 0, '#22C55E', '#3A3A44')}
      <div class="analytics-pair" style="margin-top:12px;">
        <span class="pair-label">With photo</span>
        <span class="pair-value" style="color:#3B82F6">${data.photoCount || 0}</span>
      </div>
      <div class="analytics-pair">
        <span class="pair-label">No photo</span>
        <span class="pair-value">${data.noPhotoCount || 0}</span>
      </div>
      ${pctBar(data.photoCount || 0, data.noPhotoCount || 0, '#3B82F6', '#3A3A44')}
    </div>
  `;
}

// ─── Demo Mode ──────────────────────────────────────────
let demoVisible = false;
let demoPolling = null;

function toggleDemo() {
  demoVisible = !demoVisible;
  document.getElementById('demoSection').style.display = demoVisible ? 'block' : 'none';
  if (demoVisible) pollDemoStatus();
  else if (demoPolling) { clearInterval(demoPolling); demoPolling = null; }
}

async function demoStart() {
  const count = parseInt(document.getElementById('demoCount').value) || 30;
  const duration = parseInt(document.getElementById('demoDuration').value) || 300;
  const res = await apiFetch('/api/admin/demo/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ count, duration }),
  });
  if (res.error) {
    document.getElementById('demoProgress').textContent = 'Error: ' + res.error;
    return;
  }
  document.getElementById('demoStartBtn').style.display = 'none';
  document.getElementById('demoStopBtn').style.display = 'inline-block';
  pollDemoStatus();
}

async function demoStop() {
  await apiFetch('/api/admin/demo/stop', { method: 'POST' });
  document.getElementById('demoStartBtn').style.display = 'inline-block';
  document.getElementById('demoStopBtn').style.display = 'none';
  pollDemoStatus();
}

async function demoCleanup() {
  const res = await apiFetch('/api/admin/demo/cleanup', { method: 'POST' });
  document.getElementById('demoProgress').textContent = res.deleted
    ? `Cleaned up ${res.deleted} demo badges.`
    : 'No demo badges to clean up.';
  document.getElementById('demoProgressBar').style.width = '0%';
  loadStats();
  loadBadges();
}

function pollDemoStatus() {
  if (demoPolling) clearInterval(demoPolling);
  const poll = async () => {
    const data = await apiFetch('/api/admin/demo/status');
    const pct = data.total > 0 ? Math.round((data.created / data.total) * 100) : 0;
    document.getElementById('demoProgress').textContent = data.running
      ? `Running: ${data.created}/${data.total} badges (${pct}%)`
      : data.created > 0
        ? `Complete: ${data.created}/${data.total} badges`
        : 'Status: idle';
    document.getElementById('demoProgressBar').style.width = `${pct}%`;
    if (data.running) {
      document.getElementById('demoStartBtn').style.display = 'none';
      document.getElementById('demoStopBtn').style.display = 'inline-block';
    } else {
      document.getElementById('demoStartBtn').style.display = 'inline-block';
      document.getElementById('demoStopBtn').style.display = 'none';
      if (demoPolling) { clearInterval(demoPolling); demoPolling = null; }
      // Refresh badge list when demo completes
      loadStats();
      loadBadges();
    }
  };
  poll();
  demoPolling = setInterval(poll, 2000);
}

// ─── System Log ─────────────────────────────────────────
let logVisible = false;
let logPolling = null;

function toggleLogs() {
  logVisible = !logVisible;
  document.getElementById('logSection').style.display = logVisible ? 'block' : 'none';
  if (logVisible) {
    loadLogs();
    logPolling = setInterval(loadLogs, 5000);
  } else if (logPolling) {
    clearInterval(logPolling);
    logPolling = null;
  }
}

async function loadLogs() {
  const data = await apiFetch('/api/admin/logs');
  if (data.error || !data.logs) return;

  const el = document.getElementById('logOutput');
  const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 30;

  el.innerHTML = data.logs.map(entry => {
    const color = entry.level === 'error' ? '#DC2626'
      : entry.level === 'warn' ? '#F59E0B'
      : '#667788';
    const time = entry.timestamp.slice(11, 19);
    const lvl = entry.level.toUpperCase().padEnd(5);
    return `<div style="color:${color}"><span style="color:#556677">${time}</span> <span style="color:${color}">${lvl}</span> <span style="color:#5B8DEF">[${esc(entry.category)}]</span> ${esc(entry.message)}</div>`;
  }).join('');

  if (wasAtBottom || el.scrollTop === 0) {
    el.scrollTop = 0; // newest first, so scroll to top
  }
}

      headers: {
        'Authorization': `Bearer ${sessionStorage.getItem('admin-token')}`,
        'Content-Type': 'application/json',
      },
      body: '{}',

      loadBadges();
    } else {
      alert('Render failed: ' + (result.error || 'Unknown error'));
    }
  } catch (err) {
    alert('Render failed: ' + err.message);
  }
}
